[manifest]
version = "1.0.0"
dump_lua = true
priority = -10

# Bypass get_new_boss()
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
match_indent = true
position = 'before'
pattern = '''
local eligible_bosses = {}
'''
payload = '''
-- Use SMODS object weight system when enabled
if SMODS.optional_features.object_weights then
    local ret_boss = SMODS.poll_object({type = 'Blind', seed = 'boss'})
    G.GAME.bosses_used[ret_boss] = G.GAME.bosses_used[ret_boss] + 1
    return ret_boss
end
'''

# Bypass create_card_for_shop()
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
match_indent = true
position = 'after'
pattern = '''
function create_card_for_shop(area)
'''
payload = '''
-- Use SMODS object weight system when enabled
if SMODS.optional_features.object_weights then return SMODS.create_shop_card(area) end
'''

# Bypass create_card key selection
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
match_indent = true
position = 'before'
pattern = '''
if forced_key and not G.GAME.banned_keys[forced_key] then 
'''
payload = '''
-- Use SMODS object weight system when enabled
if not forced_key and SMODS.optional_features.object_weights then forced_key = SMODS.poll_object({type = _type, guaranteed = true, rarities = legendary and {'Legendary'} or _rarity and {_rarity} or nil, append = key_append}) end

'''

# Bypass get_next_tag_key()
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
match_indent = true
position = 'after'
pattern = '''
if G.FORCE_TAG then return G.FORCE_TAG end
'''
payload = '''
if SMODS.optional_features.object_weights then return SMODS.poll_object({type = 'Tag', append = append}) end
'''