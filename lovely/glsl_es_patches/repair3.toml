# Floats defaulting to mediump causes a bunch of visual issues. we can't have that

# what could go wrong
[[patches]]
[patches.pattern]
target = '=[love "wrap_GraphicsShader.lua"]'
pattern = 'precision mediump float;'
payload = 'precision highp float;'
position = 'at'
match_indent = true